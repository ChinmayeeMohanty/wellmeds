name: med-app

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main  

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      #step1
      - name: Checkout Code
        uses: actions/checkout@v4

      #step2
      - name: Set Up JDK 21
        uses: actions/setup-java@v4
        with: 
          distribution: temurin
          java-version: 21

      #step3
      - name: Cache Maven 
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{runner.os}}-maven-${{hashfiles('**/pom.xml')}}
          restore-keys: |
            ${{runner.os}}-maven

      #step4
      - name: Grant Execute Permission
        run: chmod +x mvnw

      #step5
      - name: compile
        run: ./mvnw clean compile 

      - name: run tests 
        run: ./mvnw test  
     
      #step6
      - name: package
        run: ./mvnw clean package -DskipTests

      #step7
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with: 
          name: springboot-app
          path: target/*.jar