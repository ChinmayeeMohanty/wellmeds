<!Doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Appointment</title>
</head>
<body>
<h2>Appointment</h2>
		<form th:action="@{/appointment}"
		      th:object="${appointment}" 
		      method="post" >
		     <label>Patient Name</label>
		     <input type="text" th:field="*{patientName}"/><br>
		     <label>Patient Email</label>
		     <input type="email" th:field="*{patientEmail}"/><br>
		     <label>Patient Age</label>
		     <input type="number" th:field="*{age}"/><br>
		     <label>Gender</label>
		     <select th:field="*{gender}">
		     		<option value="female">Female</option>
		     		<option value="male">Male</option>
		     		<option value="other">Other</option>
		     </select><br>
		     <label>Doctor</label>
		      <select th:field="*{doctorName}">
		     		<option value="Dr.Baidyanth">Dr.Baidyanth</option>
		     		<option value="Dr.Jyotirmayee">Dr.Jyotirmayee</option>
		     		<option value="Dr.Chinmay">Dr.Chinmay</option>
		     </select><br>
		     <label>Appointment Date</label>
		     <input type="date" th:field="*{appointmentDate}"/><br>
		     <label>Patient Symptoms</label>
		     <input type="text" th:field="*{symptoms}"/><br>
		     <button type="submit">Book Appointment</button>

</form>
</body>
</html>
