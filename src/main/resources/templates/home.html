<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Med-App</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2 {
            text-align: center;
        }

        .actions {
            text-align: center;
            margin-bottom: 20px; 
            
        }

        .actions a {
            margin: 0 10px;
            text-decoration: none;
            
        }

        .product-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-top: 20px;
        }

        .product-card {
            width: 250px;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .product-card img {
            width: 200px;
            height: 200px;
            object-fit: contain;
        }

        .product-card p {
            margin: 8px 0;
        }

        .ai-section {
            margin-top: 30px;
            text-align: center;
        }

        .response {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<h2>Welcome to Med-App</h2>

<div class="actions">
    <a th:href="@{/add}">Add Medicine</a>
    <a th:href="@{/appointment}"> Book Appointment</a>
</div>
<div>

   <form th:action="@{/search}" method="get">
	   <input type="text" name="keyword" placeholder="Search Medicine">
	   <button type="submit">Search</button>
   </form>
   <h3 th:if="${keyword != null}">
      <span th:text="${keyword}"></span>
   
   </h3>
</div>
<div class="product-container">

    <div class="product-card" th:each="product : ${products}">

        <img th:if="${product.imageUrl != null}"
             th:src="${product.imageUrl}"
             th:alt="${product.name}">

        <h3 th:text="${product.name}"></h3>

        <p>
            <strong>Manufacturer:</strong>
            <span th:text="${product.manufacture}"></span>
        </p>

        <p>
            <strong>Price:</strong>
            ₹<span th:text="${product.price}"></span>
        </p>

        <a th:href="@{/edit/{id}(id=${product.id})}">
            Edit
        </a>
        <button th:attr="data-id=${product.id},
                         data-name=${product.name},
                         data-price=${product.price}"
                onclick="buyMedicine(this)">
            Buy Now
        </button>

    </div>

</div>

<div class="ai-section">

    <form th:action="@{/recommend}" method="post">
        <input type="text"
               name="query"
               placeholder="Enter symptoms or medicine need"
               required>

        <button type="submit">Ask AI</button>
    </form>

    <div class="response" th:if="${response != null}">
        <h3>AI Response</h3>
        <p th:text="${response}"></p>
    </div>

</div>
<script>
	 async function buyMedicine(button)
	 {
	  let amount= button.dataset.price;
	  let productName= button.dataset.name;
	  
	  const response= await fetch("/create-order",{
      method:"POST",
      headers:{
      "Content-Type":"application/x-www-form-urlencoded"
      },
      body: new URLSearchParams({
        amount
      })
	  });
	  
	  const order= await response.json();
	  const keyResponse= await fetch("/get-key");
	  const key= await keyResponse.text();
	  const options= {
      
		key: key, amount: order.amount, currency:order.currency,name:"med-app", description: productName, order_id: order.id,
		handler: async function(payment)
	   {
        const verify = await fetch("/payment-callback",{
        method: "POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
            },
        body: new URLSearchParams({
         razorpay_order_id: payment.razorpay_order_id,
         razorpay_payment_id: payment.razorpay_payment_id,
         razorpay_signature: payment.razorpay_signature
        })    
            
       });
  
        const result= await verify.text();
        alert(result);
	   },
	   theme:{
        color:"#3399cc",
        
       },
       prefill:{
       name:"customer",
       email:" ",
       contact:" "
       }
       
      };
	  var razorpay= new Razorpay(options);
	  razorpay.open();
	  
	  
	 }
</script>
</body>
</html>
